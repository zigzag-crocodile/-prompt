<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>爆款 Prompt 工坊 · 一句话生成生视频指令</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#141019; --ink-2:#0E0B12; --surface:#1E1827; --surface-2:#261F33;
  --line:#352C46; --line-soft:#2A2236;
  --text:#F1ECF9; --muted:#9B91B0; --muted-2:#6F6685;
  --hot:#FF2E7E; --violet:#8B5CFF; --mint:#34E5B0;
  --mono:'Space Grotesk',ui-sans-serif,system-ui;
  --cn:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei','Segoe UI',sans-serif;
}
html,body{height:100%;}
body{
  font-family:var(--cn);color:var(--text);-webkit-font-smoothing:antialiased;
  background:
    radial-gradient(900px 500px at 12% -8%, rgba(139,92,255,.16), transparent 60%),
    radial-gradient(800px 520px at 105% 8%, rgba(255,46,126,.14), transparent 58%),
    var(--ink);
}
.app{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;}

/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:14px 22px;border-bottom:1px solid var(--line-soft);
  background:linear-gradient(180deg,rgba(20,16,25,.85),rgba(20,16,25,.4));
  backdrop-filter:blur(8px);flex:none;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-mark{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--hot),var(--violet));position:relative;
  box-shadow:0 6px 20px rgba(255,46,126,.35);}
.brand-spark{width:11px;height:11px;border-radius:3px;background:#fff;transform:rotate(45deg);
  box-shadow:0 0 12px rgba(255,255,255,.8);}
.brand-text{display:flex;flex-direction:column;line-height:1.15;}
.brand-name{font-weight:700;font-size:16px;letter-spacing:.3px;}
.brand-sub{font-size:11.5px;color:var(--muted);margin-top:2px;}
.topbar-badge{font-size:11px;color:var(--muted);border:1px solid var(--line);
  padding:5px 11px;border-radius:999px;letter-spacing:.4px;}

/* layout */
.stage{flex:1;display:grid;grid-template-columns:minmax(360px,2fr) 3fr;gap:18px;
  padding:18px;min-height:0;}
.panel{background:linear-gradient(180deg,var(--surface),rgba(30,24,39,.6));
  border:1px solid var(--line-soft);border-radius:18px;min-height:0;}
.config{padding:20px;overflow-y:auto;}
.result{display:flex;flex-direction:column;overflow:hidden;}

/* fields */
.field{margin-bottom:16px;}
.field-head{display:flex;align-items:baseline;gap:10px;margin-bottom:9px;flex-wrap:wrap;}
.eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:1.4px;
  text-transform:uppercase;color:var(--hot);font-weight:600;}
.field-label{font-size:13.5px;color:var(--text);font-weight:600;}
.content-input{width:100%;background:var(--ink-2);border:1px solid var(--line);
  border-radius:13px;color:var(--text);font-family:var(--cn);font-size:14px;
  padding:13px 14px;resize:vertical;line-height:1.55;transition:border-color .15s,box-shadow .15s;}
.content-input::placeholder{color:var(--muted-2);}
.content-input:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 3px rgba(139,92,255,.2);}
.samples{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;}
.sample{font-size:11.5px;color:var(--muted);background:transparent;border:1px dashed var(--line);
  border-radius:999px;padding:5px 11px;cursor:pointer;font-family:var(--cn);transition:all .15s;}
.sample:hover{color:var(--text);border-color:var(--violet);border-style:solid;}
.divider{margin:18px 0 14px;padding-top:14px;border-top:1px solid var(--line-soft);}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{font-family:var(--cn);font-size:12.5px;color:var(--muted);background:var(--surface-2);
  border:1px solid var(--line);border-radius:10px;padding:7px 13px;cursor:pointer;transition:all .14s;}
.chip:hover{color:var(--text);border-color:var(--violet);}
.chip-on{color:#fff;border-color:transparent;background:linear-gradient(135deg,var(--hot),var(--violet));
  box-shadow:0 4px 14px rgba(139,92,255,.32);}
.adv-toggle{width:100%;display:flex;align-items:center;gap:10px;background:transparent;border:0;
  border-top:1px solid var(--line-soft);margin-top:18px;padding:16px 2px 12px;cursor:pointer;color:var(--text);}
.adv-hint{font-size:11.5px;color:var(--muted);margin-left:auto;}
.adv-caret{font-size:18px;color:var(--muted);transition:transform .2s;transform:rotate(90deg);}
.adv-caret.open{transform:rotate(270deg);}
.adv-body{animation:fade .25s ease;}
.adv-note{font-size:11.5px;color:var(--muted-2);margin:4px 2px 0;}
.hidden{display:none!important;}
.error{font-size:12.5px;color:#FF7BA6;background:rgba(255,46,126,.1);
  border:1px solid rgba(255,46,126,.3);border-radius:10px;padding:9px 12px;margin:14px 0 0;}
.actions{display:flex;gap:10px;margin-top:18px;}
.btn-primary{flex:1;font-family:var(--cn);font-size:14.5px;font-weight:700;color:#fff;border:0;
  border-radius:13px;padding:14px;cursor:pointer;letter-spacing:.5px;
  background:linear-gradient(135deg,var(--hot),var(--violet));box-shadow:0 8px 24px rgba(255,46,126,.3);
  transition:transform .12s,box-shadow .2s;min-height:50px;display:grid;place-items:center;}
.btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 12px 30px rgba(255,46,126,.42);}
.btn-primary:active:not(:disabled){transform:translateY(0);}
.btn-primary:disabled{opacity:.75;cursor:default;}
.btn-ghost{font-family:var(--cn);font-size:13px;color:var(--muted);background:transparent;
  border:1px solid var(--line);border-radius:13px;padding:14px 18px;cursor:pointer;transition:all .14s;}
.btn-ghost:hover:not(:disabled){color:var(--text);border-color:var(--violet);}
.loading-dots{display:inline-flex;gap:5px;}
.loading-dots i{width:7px;height:7px;border-radius:50%;background:#fff;animation:bounce 1s infinite ease-in-out;}
.loading-dots i:nth-child(2){animation-delay:.16s;}
.loading-dots i:nth-child(3){animation-delay:.32s;}
.history{margin-top:22px;padding-top:16px;border-top:1px solid var(--line-soft);}
.history-head{display:block;margin-bottom:10px;}
.history-item{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:var(--ink-2);border:1px solid var(--line-soft);border-radius:10px;padding:10px 12px;
  margin-bottom:7px;cursor:pointer;transition:all .14s;text-align:left;}
.history-item:hover{border-color:var(--violet);}
.history-title{font-size:12.5px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.history-plat{font-size:10.5px;color:var(--muted);flex:none;border:1px solid var(--line);padding:2px 8px;border-radius:999px;}

/* result */
.result-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 18px;
  border-bottom:1px solid var(--line-soft);flex:none;flex-wrap:wrap;background:rgba(14,11,18,.4);}
.result-label{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--mint);box-shadow:0 0 10px var(--mint);}
.result-tools{display:flex;gap:8px;}
.tool{font-family:var(--cn);font-size:12px;color:var(--muted);background:var(--surface-2);
  border:1px solid var(--line);border-radius:9px;padding:7px 12px;cursor:pointer;transition:all .14s;}
.tool:hover:not(:disabled){color:#fff;border-color:var(--violet);background:rgba(139,92,255,.16);}
.tool:disabled{opacity:.35;cursor:default;}
.result-body{flex:1;overflow-y:auto;padding:24px 26px;min-height:0;}
.state{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;gap:6px;padding:30px;}
.state-title{font-size:15px;font-weight:600;color:var(--text);margin-top:14px;}
.state-sub{font-size:12.5px;color:var(--muted);max-width:340px;line-height:1.6;}
.phone{width:88px;height:150px;border-radius:18px;border:2px solid var(--line);
  background:linear-gradient(160deg,var(--surface-2),var(--ink-2));position:relative;display:grid;place-items:center;overflow:hidden;}
.phone-notch{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:30px;height:5px;border-radius:999px;background:var(--line);}
.phone-play{font-size:24px;color:var(--hot);filter:drop-shadow(0 0 10px rgba(255,46,126,.6));animation:beat 1.8s infinite ease-in-out;}
.phone-lines{position:absolute;bottom:14px;left:14px;right:14px;display:flex;flex-direction:column;gap:5px;}
.phone-lines span{height:4px;border-radius:999px;background:var(--line);}
.phone-lines span:nth-child(1){width:80%;}
.phone-lines span:nth-child(2){width:55%;}
.phone-lines span:nth-child(3){width:68%;}
.pulse-ring{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;
  border:2px solid rgba(139,92,255,.35);animation:ring 1.6s infinite ease-out;}
.pulse-core{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--hot),var(--violet));box-shadow:0 0 18px rgba(255,46,126,.6);}

/* markdown */
.markdown{animation:fade .35s ease;font-size:14px;line-height:1.7;color:#E4DDF0;max-width:760px;}
.md-h1{font-size:23px;font-weight:700;line-height:1.35;margin:0 0 20px;
  background:linear-gradient(120deg,#fff,#FFC8DF 40%,#C4B0FF);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.md-h2{display:flex;align-items:center;gap:11px;font-size:17px;font-weight:700;color:#fff;margin:30px 0 14px;}
.md-h2-bar{width:4px;height:19px;border-radius:999px;flex:none;background:linear-gradient(180deg,var(--hot),var(--violet));}
.md-h3{font-size:14.5px;font-weight:700;color:var(--mint);margin:20px 0 9px;letter-spacing:.3px;}
.md-p{margin:0 0 12px;color:#D8D0E6;}
.md-strong{color:#fff;font-weight:700;}
.md-ul,.md-ol{margin:0 0 14px;padding-left:4px;list-style:none;}
.md-li{position:relative;padding-left:20px;margin-bottom:8px;color:#D8D0E6;}
.md-ul .md-li::before{content:"";position:absolute;left:3px;top:9px;width:6px;height:6px;border-radius:2px;background:linear-gradient(135deg,var(--hot),var(--violet));}
.md-ol{counter-reset:ol;}
.md-ol .md-li{counter-increment:ol;}
.md-ol .md-li::before{content:counter(ol);position:absolute;left:0;top:1px;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--hot);width:16px;text-align:center;}
.md-table-wrap{overflow-x:auto;margin:0 0 18px;border:1px solid var(--line);border-radius:12px;}
.md-table{width:100%;border-collapse:collapse;font-size:13px;min-width:420px;}
.md-table th{text-align:left;padding:11px 14px;font-weight:700;color:#fff;
  background:linear-gradient(135deg,rgba(255,46,126,.16),rgba(139,92,255,.16));border-bottom:1px solid var(--line);white-space:nowrap;}
.md-table td{padding:10px 14px;color:#D8D0E6;border-bottom:1px solid var(--line-soft);vertical-align:top;}
.md-table tr:last-child td{border-bottom:0;}
.md-table tbody tr:hover{background:rgba(139,92,255,.07);}
.md-tags{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 16px;}
.md-tag{font-size:12px;color:#FFB3D0;border:1px solid rgba(255,46,126,.4);background:rgba(255,46,126,.08);border-radius:999px;padding:5px 11px;}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink-2);
  border:1px solid var(--violet);color:#fff;font-size:13px;padding:11px 20px;border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.5);animation:rise .25s ease;z-index:50;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
@keyframes rise{from{opacity:0;transform:translate(-50%,8px);}to{opacity:1;transform:translate(-50%,0);}}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.6;}40%{transform:translateY(-7px);opacity:1;}}
@keyframes beat{0%,100%{transform:scale(1);opacity:.8;}50%{transform:scale(1.12);opacity:1;}}
@keyframes ring{0%{box-shadow:0 0 0 0 rgba(139,92,255,.4);}100%{box-shadow:0 0 0 18px rgba(139,92,255,0);}}
.config::-webkit-scrollbar,.result-body::-webkit-scrollbar,.md-table-wrap::-webkit-scrollbar{width:9px;height:9px;}
.config::-webkit-scrollbar-thumb,.result-body::-webkit-scrollbar-thumb,.md-table-wrap::-webkit-scrollbar-thumb{background:var(--line);border-radius:999px;}
.config::-webkit-scrollbar-thumb:hover,.result-body::-webkit-scrollbar-thumb:hover{background:var(--violet);}
@media (max-width:880px){.stage{grid-template-columns:1fr;overflow-y:auto;}.app{position:relative;overflow:auto;}.result{min-height:480px;}}
button:focus-visible,textarea:focus-visible{outline:2px solid var(--violet);outline-offset:2px;}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark"><span class="brand-spark"></span></span>
      <div class="brand-text">
        <span class="brand-name">爆款 Prompt 工坊</span>
        <span class="brand-sub">一句话 → 可直接出片的生视频指令</span>
      </div>
    </div>
    <div class="topbar-badge">AI 生视频 · 全模型适配</div>
  </header>

  <main class="stage">
    <!-- 左：配置 -->
    <section class="panel config">
      <div class="field">
        <div class="field-head">
          <span class="eyebrow">01 / 核心内容</span>
          <span class="field-label">想做一条什么样的短视频？</span>
        </div>
        <textarea id="content" class="content-input" rows="3"
          placeholder="一句话就行，例：制作一条年轻人独居治愈系日常短视频"></textarea>
        <div class="samples" id="samples"></div>
      </div>

      <div class="divider"><span class="eyebrow">02 / 基础配置</span></div>
      <div id="basic"></div>

      <button class="adv-toggle" id="advToggle">
        <span class="eyebrow">03 / 高级选配</span>
        <span class="adv-hint" id="advHint">展开 · 选填</span>
        <span class="adv-caret" id="advCaret">›</span>
      </button>
      <div class="adv-body hidden" id="advBody">
        <div id="advanced"></div>
        <p class="adv-note">不选则由 Agent 智能匹配。</p>
      </div>

      <div class="error hidden" id="error"></div>

      <div class="actions">
        <button class="btn-primary" id="genBtn">一键生成爆款 Prompt</button>
        <button class="btn-ghost" id="resetBtn">重置</button>
      </div>

      <div class="history hidden" id="history">
        <div class="eyebrow history-head">本次会话记录</div>
        <div id="historyList"></div>
      </div>
    </section>

    <!-- 右：结果 -->
    <section class="panel result">
      <div class="result-bar">
        <span class="result-label"><span class="dot"></span>生成结果</span>
        <div class="result-tools">
          <button class="tool" id="copyAll" disabled>复制全文</button>
          <button class="tool" id="copyPrompt" disabled>复制 Prompt</button>
          <button class="tool" id="downloadMd" disabled>下载 .md</button>
        </div>
      </div>
      <div class="result-body" id="resultBody">
        <div class="state state-empty" id="emptyState">
          <div class="phone">
            <div class="phone-notch"></div>
            <div class="phone-play">▶</div>
            <div class="phone-lines"><span></span><span></span><span></span></div>
          </div>
          <p class="state-title">左边写一句话，点生成</p>
          <p class="state-sub">输出七大模块：基础信息 · 创作思路 · 分镜脚本 · 正向 Prompt · 负面避雷 · 视频参数 · 发布素材</p>
        </div>
      </div>
    </section>
  </main>
</div>

<script>
/* ============ 配置数据 ============ */
var SAMPLES = ["年轻人独居治愈系日常","上班族晚间解压短视频","新款保温杯好物种草测评","30秒讲透一个职场心理学","宝妈带娃的真实搞笑日常","国风美食制作过程展示"];
var BASIC = [
  {key:"platform", label:"发布平台", options:["抖音","小红书","视频号","快手","通用全平台"], def:"通用全平台"},
  {key:"type", label:"视频类型", options:["真人实拍","2D动画","3D动漫","图文混剪","数字人口播"], def:"真人实拍"},
  {key:"duration", label:"视频时长", options:["15s内（短爆款）","15-30s","30-60s"], def:"15s内（短爆款）"},
  {key:"ratio", label:"画面比例", options:["9:16竖屏","16:9横屏","1:1正方形"], def:"9:16竖屏"}
];
var ADVANCED = [
  {key:"style", label:"画面风格", options:["治愈","赛博朋克","写实","复古","清新","极简","二次元"], def:"", clearable:true},
  {key:"mood", label:"情绪基调", options:["励志","伤感","治愈","搞笑","种草","悬疑"], def:"", clearable:true},
  {key:"model", label:"指定模型", options:["小云雀","即梦","Pika","Runway","剪映AI","通用模型"], def:"", clearable:true}
];

var SYSTEM_PROMPT = [
"你现在需要担任专业短视频爆款Prompt生成Agent，服务Web端短视频创作者，严格按照以下所有规则执行任务，禁止擅自更改输出格式与内容模块：","",
"# 角色定位","短视频爆款策划师+AI生视频Prompt高级工程师，精通抖音、小红书、视频号、快手四大平台爆款逻辑，熟练掌握小云雀、即梦、Pika、Runway、剪映AI等主流生视频模型的指令编写规则，擅长撰写高出片率、高流量的短视频提示词。","",
"# 工作规则","1. 需求解析：优先解析用户输入的核心内容、行业赛道、目标受众；结合用户选择的平台、视频类型、时长、比例，定制化创作，拒绝通用无效模板；","2. 爆款硬性要求：所有视频必须设置黄金3秒强钩子，钩子形式包含：反问式、反差式、痛点式、悬念式、励志式；整体视频节奏匹配对应平台特性；","3. 镜头拆分：根据视频时长，拆分3-8个镜头，每个镜头标注时长、画面内容、镜头运镜、画面细节；","4. Prompt编写：分为正向Prompt（详细画面、人物、光影、运镜、画质、风格）、负面Prompt（规避畸形人体、模糊、水印、低画质、多余元素）；","5. 输出格式：固定7大模块，Markdown格式，排版整洁、层级清晰，所有内容适配用户选择的生视频模型，可直接复制使用；","6. 附加配套：同步输出3条爆款标题、1条视频简介文案、10个精准分类话题标签，适配短视频平台发布。","",
"# 输出固定七大模块","模块1：基础信息（内容主题、适配平台、视频类型、时长、画面比例、适配模型）","模块2：爆款创作思路（赛道定位、受众画像、开头钩子设计、整体创作逻辑）","模块3：分镜脚本（标准Markdown表格：镜头序号、时长、画面描述、运镜方式）","模块4：AI正向生成Prompt（核心，分段撰写，通俗易懂）","模块5：AI负面避雷Prompt（规避所有常见AI绘图/视频瑕疵）","模块6：视频参数配置（帧率、画质、清晰度、噪点、渲染模式）","模块7：发布配套素材（爆款标题×3、视频简介、精准标签）","",
"# 特殊限制","1. 禁止输出多余废话、解释性文字，仅输出Markdown格式成品；","2. 针对不同模型做语法适配：动画类侧重画风、线条、配色；真人类侧重写实光影、人体结构、实景细节；","3. 时长15s以内镜头3-4个，15-30s镜头5-6个，30-60s镜头7-8个；","4. 所有竖屏视频统一9:16构图，优先近景、特写镜头，适配手机观看习惯。","",
"# 排版要求","- 一级标题用 \"# \"，模块标题用 \"## 一、xxx\" 的中文序号形式；","- 分镜脚本必须用标准Markdown表格语法（| 列 | 列 | 加 | --- | --- | 分隔行）；","- 话题标签写成一行，每个标签以 # 开头并用空格分隔，例：#标签1 #标签2。"
].join("\n");

/* ============ 状态 ============ */
var state = {};
BASIC.concat(ADVANCED).forEach(function(f){ state[f.key] = f.def; });
var lastResult = "";
var history = [];
var loading = false;

/* ============ 工具函数 ============ */
function $(id){ return document.getElementById(id); }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function inline(s){ return esc(s).replace(/\*\*([^*]+)\*\*/g, '<strong class="md-strong">$1</strong>'); }

var toastTimer;
function toast(msg){
  var old = document.querySelector(".toast"); if(old) old.remove();
  var el = document.createElement("div"); el.className="toast"; el.textContent=msg;
  document.body.appendChild(el);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.remove(); }, 1800);
}

/* ============ 渲染配置区 ============ */
function chipGroup(field){
  var wrap = document.createElement("div"); wrap.className="field";
  var head = document.createElement("div"); head.className="field-head";
  head.innerHTML = '<span class="field-label">'+esc(field.label)+'</span>';
  wrap.appendChild(head);
  var chips = document.createElement("div"); chips.className="chips";
  field.options.forEach(function(opt){
    var b = document.createElement("button"); b.type="button";
    b.className = "chip" + (state[field.key]===opt ? " chip-on" : "");
    b.textContent = opt;
    b.onclick = function(){
      state[field.key] = (field.clearable && state[field.key]===opt) ? "" : opt;
      Array.prototype.forEach.call(chips.children, function(c){
        c.className = "chip" + (c.textContent===state[field.key] ? " chip-on" : "");
      });
    };
    chips.appendChild(b);
  });
  wrap.appendChild(chips);
  return wrap;
}
(function init(){
  var sc = $("samples");
  SAMPLES.forEach(function(s){
    var b=document.createElement("button"); b.className="sample"; b.textContent=s;
    b.onclick=function(){ $("content").value=s; };
    sc.appendChild(b);
  });
  BASIC.forEach(function(f){ $("basic").appendChild(chipGroup(f)); });
  ADVANCED.forEach(function(f){ $("advanced").appendChild(chipGroup(f)); });
})();

$("advToggle").onclick = function(){
  var body=$("advBody"), caret=$("advCaret"), hint=$("advHint");
  var open = body.classList.toggle("hidden")===false;
  caret.className = "adv-caret" + (open?" open":"");
  hint.textContent = open ? "收起" : "展开 · 选填";
};

/* ============ Markdown 渲染 ============ */
function isHashtagLine(t){
  if(t.indexOf("#")!==0) return false;
  if(/^#{1,6}\s/.test(t)) return false;
  var toks = t.split(/\s+/);
  return toks.length>=2 && toks.every(function(x){ return x.indexOf("#")===0; });
}
function renderMarkdown(md){
  var lines = md.replace(/\r/g,"").split("\n");
  var html = ""; var i=0; var listBuf=[]; var listType=null;
  function flush(){
    if(!listBuf.length) return;
    var inner = listBuf.map(function(it){ return '<li class="md-li">'+inline(it)+'</li>'; }).join("");
    html += listType==="ol" ? '<ol class="md-ol">'+inner+'</ol>' : '<ul class="md-ul">'+inner+'</ul>';
    listBuf=[]; listType=null;
  }
  while(i<lines.length){
    var t = lines[i].trim();
    if(t.indexOf("|")===0 && t.lastIndexOf("|")===t.length-1 && t.length>1){
      flush();
      var rows=[];
      while(i<lines.length){
        var rl=lines[i].trim();
        if(!(rl.indexOf("|")===0 && rl.lastIndexOf("|")===rl.length-1 && rl.length>1)) break;
        rows.push(rl); i++;
      }
      var cells = rows.map(function(r){ return r.slice(1,-1).split("|").map(function(c){return c.trim();}); });
      var bodyStart = (cells[1] && cells[1].every(function(c){return /^:?-{2,}:?$/.test(c);})) ? 2 : 1;
      var th = cells[0].map(function(c){ return "<th>"+inline(c)+"</th>"; }).join("");
      var tb = cells.slice(bodyStart).map(function(row){
        return "<tr>"+row.map(function(c){return "<td>"+inline(c)+"</td>";}).join("")+"</tr>";
      }).join("");
      html += '<div class="md-table-wrap"><table class="md-table"><thead><tr>'+th+'</tr></thead><tbody>'+tb+'</tbody></table></div>';
      continue;
    }
    if(isHashtagLine(t)){
      flush();
      var tags = t.split(/\s+/).filter(Boolean).map(function(g){ return '<span class="md-tag">'+esc(g)+'</span>'; }).join("");
      html += '<div class="md-tags">'+tags+'</div>'; i++; continue;
    }
    if(/^#{1,6}\s/.test(t)){
      flush();
      var lvl = t.match(/^(#{1,6})\s/)[1].length;
      var txt = t.replace(/^#{1,6}\s/,"");
      if(lvl===1) html += '<h1 class="md-h1">'+inline(txt)+'</h1>';
      else if(lvl===2) html += '<h2 class="md-h2"><span class="md-h2-bar"></span><span>'+inline(txt)+'</span></h2>';
      else html += '<h3 class="md-h3">'+inline(txt)+'</h3>';
      i++; continue;
    }
    if(/^[-*]\s/.test(t)){ if(listType&&listType!=="ul")flush(); listType="ul"; listBuf.push(t.replace(/^[-*]\s/,"")); i++; continue; }
    if(/^\d+\.\s/.test(t)){ if(listType&&listType!=="ol")flush(); listType="ol"; listBuf.push(t.replace(/^\d+\.\s/,"")); i++; continue; }
    if(t===""){ flush(); i++; continue; }
    flush(); html += '<p class="md-p">'+inline(t)+'</p>'; i++;
  }
  flush();
  return html;
}
function extractPositive(md){
  var lines = md.replace(/\r/g,"").split("\n"); var cap=false; var buf=[];
  for(var k=0;k<lines.length;k++){
    var t=lines[k].trim();
    if(/^##\s.*正向/.test(t)){ cap=true; continue; }
    if(cap && /^##\s/.test(t)) break;
    if(cap) buf.push(lines[k]);
  }
  return buf.join("\n").trim();
}

/* ============ 结果区状态 ============ */
function showEmpty(){
  $("resultBody").innerHTML =
    '<div class="state state-empty"><div class="phone"><div class="phone-notch"></div>'+
    '<div class="phone-play">▶</div><div class="phone-lines"><span></span><span></span><span></span></div></div>'+
    '<p class="state-title">左边写一句话，点生成</p>'+
    '<p class="state-sub">输出七大模块：基础信息 · 创作思路 · 分镜脚本 · 正向 Prompt · 负面避雷 · 视频参数 · 发布素材</p></div>';
}
function showLoading(){
  $("resultBody").innerHTML =
    '<div class="state state-loading"><div class="pulse-ring"><div class="pulse-core"></div></div>'+
    '<p class="state-title">正在拆解需求、设计黄金 3 秒…</p>'+
    '<p class="state-sub">匹配赛道 · 编排分镜 · 撰写正反向 Prompt</p></div>';
}
function showResult(md){
  $("resultBody").innerHTML = '<article class="markdown">'+renderMarkdown(md)+'</article>';
  $("resultBody").scrollTop = 0;
}
function setTools(on){
  $("copyAll").disabled = !on; $("copyPrompt").disabled = !on; $("downloadMd").disabled = !on;
}
function renderHistory(){
  if(!history.length){ $("history").classList.add("hidden"); return; }
  $("history").classList.remove("hidden");
  var list=$("historyList"); list.innerHTML="";
  history.forEach(function(h){
    var b=document.createElement("button"); b.className="history-item";
    b.innerHTML='<span class="history-title">'+esc(h.title)+'</span><span class="history-plat">'+esc(h.platform)+'</span>';
    b.onclick=function(){ lastResult=h.md; showResult(h.md); setTools(true); };
    list.appendChild(b);
  });
}

/* ============ 生成 ============ */
function showError(msg){ var e=$("error"); e.textContent=msg; e.classList.remove("hidden"); }
function clearError(){ $("error").classList.add("hidden"); }

async function generate(){
  var content = $("content").value.trim();
  if(!content){ showError("先写一句话，说说你想做的视频内容。"); return; }
  clearError();
  loading = true;
  $("genBtn").disabled = true; $("resetBtn").disabled = true;
  $("genBtn").innerHTML = '<span class="loading-dots"><i></i><i></i><i></i></span>';
  showLoading(); setTools(false);

  var userMsg =
    "核心内容："+content+"\n"+
    "发布平台："+state.platform+"\n"+
    "视频类型："+state.type+"\n"+
    "视频时长："+state.duration+"\n"+
    "画面比例："+state.ratio+"\n"+
    (state.style?("画面风格："+state.style+"\n"):"")+
    (state.mood?("情绪基调："+state.mood+"\n"):"")+
    (state.model?("指定适配模型："+state.model+"\n"):"")+
    "\n请严格按系统规则，输出七大模块的 Markdown 成品，不要任何多余解释或前后缀。";

  try{
    var resp = await fetch("/api/generate", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ system: SYSTEM_PROMPT, user: userMsg })
    });
    var data = await resp.json();
    if(!resp.ok) throw new Error(data.error || "生成失败");
    var text = (data.text||"").trim();
    if(!text) throw new Error("模型返回为空，请重试");
    lastResult = text;
    showResult(text); setTools(true);
    history.unshift({ id:Date.now(), title:content, platform:state.platform, md:text });
    history = history.slice(0,12);
    renderHistory();
  }catch(e){
    showError("生成没成功："+(e.message||"网络波动")+"，稍等再点一次。");
    showEmpty();
  }finally{
    loading=false;
    $("genBtn").disabled=false; $("resetBtn").disabled=false;
    $("genBtn").textContent="一键生成爆款 Prompt";
  }
}

/* ============ 复制 / 下载 / 重置 ============ */
async function copyText(text, okMsg){
  try{ await navigator.clipboard.writeText(text); toast(okMsg); }
  catch(e){ toast("复制失败，请手动选择"); }
}
$("genBtn").onclick = generate;
$("copyAll").onclick = function(){ if(lastResult) copyText(lastResult,"已复制全文 Markdown"); };
$("copyPrompt").onclick = function(){
  var p = extractPositive(lastResult);
  if(!p){ toast("没找到正向 Prompt 模块"); return; }
  copyText(p,"已复制正向 Prompt");
};
$("downloadMd").onclick = function(){
  if(!lastResult) return;
  var blob = new Blob([lastResult], {type:"text/markdown;charset=utf-8"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href=url; a.download=($("content").value.trim()||"爆款Prompt").slice(0,20)+".md";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url); toast("已下载 .md 文件");
};
$("resetBtn").onclick = function(){
  $("content").value="";
  BASIC.concat(ADVANCED).forEach(function(f){ state[f.key]=f.def; });
  $("basic").innerHTML=""; $("advanced").innerHTML="";
  BASIC.forEach(function(f){ $("basic").appendChild(chipGroup(f)); });
  ADVANCED.forEach(function(f){ $("advanced").appendChild(chipGroup(f)); });
  clearError();
};
</script>
